<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ Socket.io CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-12 text-center">
            <div class="nav">
                <img class="logo" src="logo.png" alt="">
                <h1 class="heading">Whatsapp</h1>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="box" id="message-container"></div>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="send">
            <form action="#" id="send-container">
                <div class="row g-0">
                    <div class="col-md-10 col-9">
                        <input type="text" name="messageInp" id="messageInp" autocomplete="off">
                    </div>
                    <div class="col-md-2 col-3">
                        <button class="btn btn-primary w-100">Send</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>

<!-- ✅ Socket Connection -->
<script>
    const socket = io("https://chatapp-uebu.onrender.com", {
        transports: ["websocket", "polling"]
    });

    const form = document.getElementById("send-container");
    const messageInput = document.getElementById("messageInp");
    const messageContainer = document.getElementById("message-container");

    const name = prompt("Enter your name to join");
    socket.emit("new-user-joined", name);

    socket.on("user-joined", name => {
        appendMessage(name + " joined the chat", "left");
    });

    socket.on("receive", data => {
        appendMessage(data.name + ": " + data.message, "left");
    });

    socket.on("left", name => {
        appendMessage(name + " left the chat", "left");
    });

    form.addEventListener("submit", (e) => {
        e.preventDefault();
        const message = messageInput.value;
        appendMessage("You: " + message, "right");
        socket.emit("send", message);
        messageInput.value = "";
    });

    function appendMessage(message, position) {
        const messageElement = document.createElement("div");
        messageElement.innerText = message;
        messageElement.classList.add("message");
        messageElement.classList.add(position);
        messageContainer.append(messageElement);
    }

    socket.on("connect", () => {
        console.log("Connected Successfully ✅");
    });
</script>

</body>
</html>
